#loginPage::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(13,27,42,.6) 0%,rgba(13,27,42,.85) 60%,rgba(13,27,42,.97) 100%);z-index:1}
#loginPage > *{position:relative;z-index:2}
.login-logo{width:90px;height:90px;border-radius:50%;overflow:hidden;border:2.5px solid var(--gold);box-shadow:0 0 30px rgba(201,151,58,.4);margin-bottom:14px;flex-shrink:0}
.login-logo img{width:100%;height:100%;object-fit:cover}
#loginPage h2{color:var(--gold);font-size:18px;font-weight:900;text-align:center;line-height:1.7;margin-bottom:4px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
#loginPage p{color:rgba(255,255,255,.5);font-size:12px;text-align:center;margin-bottom:36px}
.lform{width:100%;max-width:340px}
.lform .fc{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff;backdrop-filter:blur(4px)}
.lform .fc::placeholder{color:rgba(255,255,255,.4)}
.lform .fl{color:rgba(255,255,255,.7)}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}

/* TOPBAR */
.topbar{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.25)}
.tb-title{font-size:14px;font-weight:700;color:var(--gold);text-align:center}
.tb-user{display:flex;align-items:center;gap:6px}
.tb-name{font-size:11.5px;color:rgba(255,255,255,.75);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rbadge{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700}
.r-admin{background:var(--gold);color:var(--navy)}
.r-leader{background:var(--blue2);color:#fff}
.tb-sync{background:none;border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;padding:5px;line-height:1}
.tb-logout{background:none;border:none;color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;padding:5px;line-height:1}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green2);display:inline-block;margin-right:2px;animation:pulse2 2s infinite}
@keyframes pulse2{0%,100%{opacity:1}50%{opacity:.4}}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:1px solid var(--gray2);display:flex;height:62px;box-shadow:0 -3px 16px rgba(0,0,0,.07)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text2);transition:all .2s;border:none;background:none;font-family:'Cairo',sans-serif;font-size:9.5px;font-weight:600;position:relative}
.bni .ic{font-size:21px;transition:transform .2s}
.bni.active{color:var(--blue2)}
.bni.active .ic{transform:translateY(-2px)}
.bni.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:3px;background:var(--blue2);border-radius:0 0 4px 4px}
.bni .ndot{position:absolute;top:8px;right:calc(50% - 14px);width:7px;height:7px;border-radius:50%;background:var(--red2);border:1.5px solid #fff}

/* MAIN */
.main{flex:1;padding:14px 14px 78px}
.page{display:none;animation:fadeUp .28s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* SECTION TITLE */
.stitle{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* KPI */
.kgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kcard{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--sh2);border-right:4px solid transparent;cursor:pointer;transition:transform .15s}
.kcard:active{transform:scale(.98)}
.kcard.kb{border-right-color:var(--blue2)}
.kcard.kg{border-right-color:var(--green2)}
.kcard.kr{border-right-color:var(--red2)}
.kcard.ko{border-right-color:var(--orange)}
.kcard.kgo{border-right-color:var(--gold)}
.kcard .ki{font-size:26px;margin-bottom:6px}
.kcard .kv{font-size:24px;font-weight:900;color:var(--navy);line-height:1}
.kcard .kl{font-size:10.5px;color:var(--text2);margin-top:3px;font-weight:600}

/* CARD */
.card{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--sh2);margin-bottom:11px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--gray2)}
.card-tt{font-size:13.5px;font-weight:700;color:var(--navy)}

/* SEARCH */
.sbar{background:#fff;border-radius:var(--r2);padding:9px 13px;display:flex;align-items:center;gap:9px;box-shadow:var(--sh2);margin-bottom:13px;border:2px solid transparent;transition:border-color .2s}
.sbar:focus-within{border-color:var(--blue2)}
.sbar input{flex:1;border:none;outline:none;font-family:'Cairo',sans-serif;font-size:13.5px;color:var(--text);background:none}

/* TABS */
.tabs{display:flex;gap:7px;margin-bottom:13px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tabb{flex-shrink:0;padding:7px 14px;border-radius:20px;border:none;font-family:'Cairo',sans-serif;font-size:11.5px;font-weight:700;cursor:pointer;transition:all .2s;background:#fff;color:var(--text2);box-shadow:var(--sh2)}
.tabb.active{background:var(--navy);color:#fff}

/* MEMBER CARD */
.mcard{background:#fff;border-radius:var(--r);padding:13px 14px;box-shadow:var(--sh2);margin-bottom:9px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .2s;border:1.5px solid transparent}
.mcard:active{border-color:var(--blue2);transform:scale(.99)}
.mav{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
.mav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.minfo{flex:1;min-width:0}
.mname{font-size:13.5px;font-weight:700;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msub{font-size:10.5px;color:var(--text2);margin-top:2px}
.mbal{text-align:left;flex-shrink:0}
.bp{color:var(--green2);font-size:12.5px;font-weight:800}
.bn{color:var(--red2);font-size:12.5px;font-weight:800}
.bz{color:var(--text2);font-size:12.5px;font-weight:600}
.bl{font-size:9.5px;color:var(--text2);text-align:left}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2.5px 9px;border-radius:20px;font-size:10.5px;font-weight:700}
.b-act{background:var(--greenli);color:var(--green2)}
.b-ina{background:var(--redli);color:var(--red2)}
.b-paid{background:var(--greenli);color:var(--green2)}
.b-due{background:var(--redli);color:var(--red2)}
.b-par{background:var(--orangeli);color:var(--orange)}
.b-old{background:var(--purpleli);color:var(--purple)}
.b-pen{background:var(--goldli);color:var(--gold)}
.b-adm{background:linear-gradient(135deg,var(--gold),#e8c96a);color:var(--navy)}
.b-lea{background:var(--blue2);color:#fff}
.b-ok{background:var(--greenli);color:var(--green2)}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:var(--r2);font-family:'Cairo',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;border:none;transition:all .2s;width:100%}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--blue2),var(--navy));color:#fff;box-shadow:0 4px 14px rgba(21,101,192,.35)}
.btn-s{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;box-shadow:0 4px 14px rgba(46,125,50,.3)}
.btn-d{background:linear-gradient(135deg,var(--red2),var(--red));color:#fff;box-shadow:0 4px 14px rgba(198,40,40,.3)}
.btn-g{background:linear-gradient(135deg,var(--gold),#e8c96a);color:var(--navy);box-shadow:0 4px 14px rgba(201,151,58,.3)}
.btn-o{background:#fff;color:var(--blue2);border:2px solid var(--blue2)}
.btn-or{background:#fff;color:var(--red2);border:2px solid var(--red2)}
.btn-sm{padding:7px 13px;font-size:11.5px;border-radius:8px;width:auto}
.btn-xs{padding:5px 10px;font-size:10.5px;border-radius:7px;width:auto}

/* FAB */
.fab{position:fixed;bottom:72px;left:18px;z-index:99;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#e8c96a);color:var(--navy);font-size:26px;border:none;cursor:pointer;box-shadow:0 5px 18px rgba(201,151,58,.45);display:flex;align-items:center;justify-content:center;transition:all .2s}
.fab:active{transform:scale(.9)}

/* MODAL */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:20px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease}
.overlay.open .modal{transform:translateY(0)}
.mhandle{width:38px;height:4px;background:var(--gray2);border-radius:2px;margin:0 auto 18px}
.mtitle{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:18px}

/* FORM */
.fg{margin-bottom:14px}
.fl{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block}
.fc{width:100%;padding:11px 13px;border:2px solid var(--gray2);border-radius:var(--r2);font-family:'Cairo',sans-serif;font-size:13.5px;color:var(--text);background:#fff;outline:none;transition:border-color .2s;appearance:none}
.fc:focus{border-color:var(--blue2)}
select.fc{cursor:pointer;background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");background-repeat:no-repeat;background-position:left 10px center;background-size:16px;padding-left:32px}

/* DETAIL */
.det-hdr{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:var(--r);padding:18px 14px;margin-bottom:14px;color:#fff;text-align:center}
.det-av{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#e8c96a);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:var(--navy);margin:0 auto 11px;box-shadow:0 4px 14px rgba(0,0,0,.25);overflow:hidden}
.det-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.det-name{font-size:17px;font-weight:800}
.det-sub{font-size:11.5px;color:rgba(255,255,255,.55);margin-top:3px}

/* BALANCE */
.balbox{border-radius:var(--r);padding:15px;margin-bottom:12px;text-align:center}
.balbox.pos{background:var(--greenli);border:2px solid var(--green2)}
.balbox.neg{background:var(--redli);border:2px solid var(--red2)}
.balbox.zer{background:var(--gray);border:2px solid var(--gray3)}
.balbox .bico{font-size:30px;margin-bottom:3px}
.balbox .bamt{font-size:26px;font-weight:900}
.balbox.pos .bamt{color:var(--green2)}
.balbox.neg .bamt{color:var(--red2)}
.balbox .blbl{font-size:11.5px;color:var(--text2);margin-top:3px;font-weight:600}
.balbox .bmo{font-size:12px;font-weight:700;margin-top:7px;padding:3px 11px;background:rgba(0,0,0,.06);border-radius:20px;display:inline-block}

/* STATS */
.srow{display:flex;gap:8px;margin-bottom:12px}
.sbox{flex:1;background:#fff;border-radius:var(--r2);padding:11px;text-align:center;box-shadow:var(--sh2)}
.sbox .sv{font-size:18px;font-weight:900;color:var(--navy)}
.sbox .sl{font-size:10px;color:var(--text2);font-weight:600;margin-top:2px}

/* INFO ROW */
.irow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gray2)}
.irow:last-child{border-bottom:none}
.ilbl{font-size:11.5px;color:var(--text2);font-weight:600}
.ival{font-size:12.5px;font-weight:700;color:var(--navy)}

/* DEBT ITEM */
.ditem{background:#fff;border-radius:var(--r2);padding:11px 13px;margin-bottom:7px;box-shadow:var(--sh2);display:flex;align-items:center;justify-content:space-between;border-right:4px solid transparent;cursor:pointer;transition:all .2s}
.ditem:active{transform:scale(.99)}
.ditem.dd{border-right-color:var(--red2)}
.ditem.dp{border-right-color:var(--orange)}
.ditem.dk{border-right-color:var(--green2)}
.ditem.do{border-right-color:var(--purple)}
.dm{font-size:12.5px;font-weight:700;color:var(--navy)}
.dr{font-size:10.5px;color:var(--text2);margin-top:2px}
.da{font-size:13.5px;font-weight:800}
.ditem.dd .da{color:var(--red2)}
.ditem.dp .da{color:var(--orange)}
.ditem.dk .da{color:var(--green2)}
.ditem.do .da{color:var(--purple)}

/* PAYMENT ITEM */
.pitem{background:#fff;border-radius:var(--r2);padding:11px 13px;margin-bottom:7px;box-shadow:var(--sh2);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s}
.pitem:active{transform:scale(.99)}
.pdt{font-size:11.5px;color:var(--text2)}
.pme{font-size:10.5px;color:var(--text2);margin-top:2px}
.pamt{font-size:13.5px;font-weight:800;color:var(--green2)}

/* PROGRESS */
.pbar-wrap{margin:6px 0}
.pbar-lbl{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text2);margin-bottom:3px}
.pbar{height:7px;background:var(--gray2);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue2),var(--gold));transition:width 1.2s ease}

/* EMPTY */
.empty{text-align:center;padding:36px 16px}
.empty .ei{font-size:44px;margin-bottom:10px}
.empty .et{font-size:13px;color:var(--text2);font-weight:600}

/* ALERT */
.alert{position:fixed;top:66px;left:14px;right:14px;z-index:999;padding:13px 15px;border-radius:var(--r2);font-size:12.5px;font-weight:700;text-align:center;transform:translateY(-16px);opacity:0;transition:all .3s;pointer-events:none}
.alert.show{transform:translateY(0);opacity:1}
.al-ok{background:var(--green2);color:#fff;box-shadow:0 4px 18px rgba(46,125,50,.4)}
.al-err{background:var(--red2);color:#fff;box-shadow:0 4px 18px rgba(198,40,40,.4)}
.al-inf{background:var(--blue2);color:#fff;box-shadow:0 4px 18px rgba(25,118,210,.4)}

/* BACK */
.back-btn{background:none;border:none;color:var(--blue2);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:11px;display:flex;align-items:center;gap:4px;padding:0}

/* PHOTO UPLOAD */
.phu{width:72px;height:72px;border-radius:50%;border:2px dashed var(--gray3);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;margin:0 auto 8px;background:var(--gray);transition:border-color .2s}
.phu:hover{border-color:var(--blue2)}
.phu img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.phu span{font-size:28px}

/* MONTH GRID */
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.mbox{background:#fff;border-radius:8px;padding:7px 4px;text-align:center;box-shadow:var(--sh2);font-size:10px;font-weight:700;border:1.5px solid transparent}
.mbox.mpaid{background:var(--greenli);color:var(--green2);border-color:var(--green2)}
.mbox.mdue{background:var(--redli);color:var(--red2);border-color:var(--red2)}
.mbox.mpar{background:var(--orangeli);color:var(--orange);border-color:var(--orange)}
.mbox.mem{color:var(--text2)}

/* TOGGLE */
.trow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray2)}
.trow:last-child{border-bottom:none}
.tog{width:44px;height:24px;border-radius:12px;background:var(--gray3);position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.tog.on{background:var(--green2)}
.tog::after{content:'';position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog.on::after{transform:translateX(-20px)}

/* NOTIF ITEM */
.nitem{background:#fff;border-radius:var(--r2);padding:10px 12px;margin-bottom:7px;box-shadow:var(--sh2);display:flex;gap:10px;align-items:flex-start}
.nico{font-size:22px;flex-shrink:0}
.nmsg{font-size:11.5px;color:var(--text);line-height:1.6}
.ntime{font-size:10px;color:var(--text2);margin-top:3px}

/* SYNC STATUS */
.sync-bar{background:var(--navy2);color:rgba(255,255,255,.7);font-size:11px;text-align:center;padding:4px;display:none}
.sync-bar.show{display:block}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--gray3);border-radius:2px}
</style>
</head>

<script>
// ═══════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCYZXQFi97cz7Q7wQwbhq0RisHXMDOgVCw",
  authDomain: "zainab-haia-7b9d5.firebaseapp.com",

  projectId: "zainab-haia-7b9d5",

  appId: "1:360098880295:web:72bb1b53516bfed364e702"

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ═══════════════════════════════════════
// DATA STATE — in memory, synced from Firebase
// ═══════════════════════════════════════
let STATE = {
  users: {},
  groups: {},
  members: {},
  debts: {},
  payments: {},
  notifications: {},
  settings: {
    tgToken: '',
    tgAdminChat: '',
    defaultMonthly: 10000,
    currency: 'د.ع',
    notifyPayment: true,
    notifyDebt: true,
    notifyWelcome: true,
    notifyMonthlyReport: true
  }
};

let SESSION = null;
let CP = 'home';
let groupFilter = 'all';
let debtFilter = 'all';
let realtimeListeners = [];

// ═══════════════════════════════════════
// FIREBASE OPERATIONS
// ═══════════════════════════════════════
function fbSet(path, data) {
  return db.ref(path).set(data);
}

function fbPush(path, data) {
  return db.ref(path).push(data);
}

function fbUpdate(path, data) {
  return db.ref(path).update(data);
}

function fbRemove(path) {
  return db.ref(path).remove();
}

function fbGet(path) {
  return db.ref(path).once('value').then(s => s.val());
}

// Listen to a path and update STATE
function fbListen(path, stateKey) {
  const ref = db.ref(path);
  ref.on('value', snap => {
    const val = snap.val();
    STATE[stateKey] = val || {};
    renderAll();
  });
  realtimeListeners.push({ ref, stateKey });
}

// ═══════════════════════════════════════
// INIT — Default data if empty
// ═══════════════════════════════════════
async function initDefaultData() {
  const exists = await fbGet('users');
  if (exists) return; // Already initialized

  setLdStatus('جاري تهيئة قاعدة البيانات...', 60);

  const defaultUsers = {

  };
  const defaultGroups = {
    'G001': { id:'G001', name:'مجموعة بغداد', lid:'', active:true, created:td() },

  await fbSet('users', defaultUsers);
  await fbSet('groups', defaultGroups);
  await fbSet('settings', defaultSettings);
  await fbSet('members', {});

// ═══════════════════════════════════════
// SESSION
// ═══════════════════════════════════════
function getSess() { return SESSION; }
function setSess(u) { SESSION = u; sessionStorage.setItem('z_sess', JSON.stringify(u)); }

function doLogin() {

  const users = Object.values(STATE.users || {});
  const user = users.find(x => x.uname === u && x.pass === p && x.active);
  if (!user) { showAlert('❌ اسم المستخدم أو كلمة المرور غلط', 'err'); return; }
  setSess(user);
  document.getElementById('loginPage').style.display = 'none';

}

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
function bootApp() {
  const sess = getSess();
  if (!sess) return;

// ═══════════════════════════════════════
// NAV
// ═══════════════════════════════════════
function nav(page, btn) {

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function arr(obj) { return Object.values(obj || {}); }

function visMembers() {
  const sess = getSess(); if (!sess) return [];
  const ms = arr(STATE.members);
  if (sess.role === 'leader') return ms.filter(m => m.gid === sess.gid);
  return ms;
}

function visMembersByGroup(gid) {
  const sess = getSess(); if (!sess) return [];
  if (sess.role === 'leader') return arr(STATE.members).filter(m => m.gid === sess.gid);
  if (gid && gid !== 'all') return arr(STATE.members).filter(m => m.gid === gid);
  return arr(STATE.members);
}

function visDebts() {
  const sess = getSess(); if (!sess) return [];
  const ds = arr(STATE.debts);
  if (sess.role === 'leader') return ds.filter(d => d.gid === sess.gid);
  return ds;
}

function visPays() {
  const sess = getSess(); if (!sess) return [];
  const ps = arr(STATE.payments);
  if (sess.role === 'leader') return ps.filter(p => p.gid === sess.gid);
  return ps;
}

function calcBal(mid) {
  const m = STATE.members[mid]; if (!m) return { paid:0, debts:0, bal:0, months:0, dueDebts:0, dueCount:0 };
  const paid = arr(STATE.payments).filter(p => p.mid === mid && p.status === 'مؤكد').reduce((s,p)=>s+p.amount,0);
  const allDebts = arr(STATE.debts).filter(d => d.mid === mid);
  const debts = (m.oldDebt||0) + allDebts.reduce((s,d)=>s+d.amount,0);
  const dueDebts = allDebts.filter(d=>d.status==='مستحق').reduce((s,d)=>s+d.amount,0);
  const dueCount = allDebts.filter(d=>d.status==='مستحق').length;
  const bal = paid - debts;
  const months = m.monthly > 0 ? Math.floor(Math.max(0,paid) / m.monthly) : 0;
  return { paid, debts, bal, months, dueDebts, dueCount };
}

function avatarColor(id) {
  const c = ['#1565c0','#2e7d32','#6a1b9a','#c62828','#e65100','#00695c','#4527a0'];
  let h = 0; for (let i=0;i<id.length;i++) h=id.charCodeAt(i)+((h<<5)-h);
  return c[Math.abs(h)%c.length];
}

function fmt(n) {
  if (typeof n !== 'number') n = parseInt(n)||0;
  const neg = n<0; const abs = Math.abs(n);
  return (neg?'-':'')+abs.toLocaleString('ar-IQ')+' '+(STATE.settings?.currency||'د.ع');
}

function fmtS(n) {
  if (typeof n !== 'number') n = parseInt(n)||0;
  const neg = n<0; const abs = Math.abs(n);
  if (abs>=1000000) return (neg?'-':'')+(abs/1000000).toFixed(1)+'م';
  if (abs>=1000) return (neg?'-':'')+(abs/1000).toFixed(0)+'ألف';
  return (neg?'-':'')+abs.toLocaleString();
}

function td() { return new Date().toISOString().split('T')[0]; }

function uid() { return Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,5).toUpperCase(); }

function showAlert(msg, type='ok') {
  const el = document.getElementById('alertBox');
  el.textContent = msg; el.className = `alert al-${type} show`;
  setTimeout(() => el.classList.remove('show'), 3200);
}

function setSyncing(on) {
  const bar = document.getElementById('syncBar');

function setLdStatus(msg, pct) {
  document.getElementById('ldStatus').textContent = msg;

function renderAll() {

  renderDebts();

  renderNotif();
  renderSettings();

// ═══════════════════════════════════════
// HOME
// ═══════════════════════════════════════
function renderHome() {
  const sess = getSess(); if (!sess) return;
  const ms = visMembers();
  const ds = visDebts();
  const ps = visPays();
  const totalDebts = ds.reduce((s,d)=>s+d.amount,0);
  const totalPaid = ps.filter(p=>p.status==='مؤكد').reduce((s,p)=>s+p.amount,0);
  const dueCount = ds.filter(d=>d.status==='مستحق').length;
  const dueAmt = ds.filter(d=>d.status==='مستحق').reduce((s,d)=>s+d.amount,0);

  // Calculate members with negative balance
  const negBalCount = ms.filter(m=>calcBal(m.id).bal<0).length;
  const negBalAmt = ms.filter(m=>calcBal(m.id).bal<0).reduce((s,m)=>s+Math.abs(calcBal(m.id).bal),0);

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kcard kb"><div class="ki">👥</div><div class="kv">${ms.length}</div><div class="kl">إجمالي المشتركين</div></div>
    <div class="kcard kg"><div class="ki">✅</div><div class="kv">${ms.filter(m=>m.status==='نشط').length}</div><div class="kl">المشتركون النشطون</div></div>
    <div class="kcard kr"><div class="ki">🔴</div><div class="kv">${negBalCount}</div><div class="kl">أرصدة سالبة</div></div>
    <div class="kcard ko"><div class="ki">⚠️</div><div class="kv">${fmtS(negBalAmt)}</div><div class="kl">إجمالي المديونية</div></div>
    <div class="kcard kgo"><div class="ki">💰</div><div class="kv">${fmtS(totalPaid)}</div><div class="kl">إجمالي المقبوض</div></div>
    <div class="kcard ko"><div class="ki">📊</div><div class="kv">${fmtS(totalDebts)}</div><div class="kl">إجمالي الديون</div></div>
  `;

  let gh = '';
  if (sess.role === 'admin') {
    gh = `<div class="card"><div class="card-hd"><div class="card-tt">🏘️ تحصيل المجموعات</div></div>`;
    arr(STATE.groups).forEach(g => {
      const gPaid = ps.filter(p=>p.gid===g.id&&p.status==='مؤكد').reduce((s,p)=>s+p.amount,0);
      const gDebts = ds.filter(d=>d.gid===g.id).reduce((s,d)=>s+d.amount,0);
      const pct = gDebts>0 ? Math.min(100,Math.round(gPaid/gDebts*100)) : 100;
      const cnt = arr(STATE.members).filter(m=>m.gid===g.id).length;
      gh += `<div style="margin-bottom:13px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12.5px;font-weight:700;color:var(--navy)">${g.name}</span><span style="font-size:10.5px;color:var(--text2)">${cnt} مشترك</span></div><div class="pbar-wrap"><div class="pbar-lbl"><span>التحصيل</span><span>${pct}%</span></div><div class="pbar"><div class="pbar-fill" data-w="${pct}" style="width:0"></div></div></div></div>`;
    });
    gh += '</div>';
  }
  document.getElementById('homeGroups').innerHTML = gh;
  setTimeout(() => document.querySelectorAll('#homeGroups .pbar-fill').forEach(el => el.style.width = el.dataset.w+'%'), 120);

  const recPays = visPays().sort((a,z)=>(z.created||'').localeCompare(a.created||'')).slice(0,5);
  let rh = '';
  if (!recPays.length) { rh = `<div class="empty"><div class="ei">📋</div><div class="et">لا توجد دفعات بعد</div></div>`; }
  else recPays.forEach(p => {
    const m = STATE.members[p.mid];
    rh += `<div class="irow" onclick="openDet('${p.mid}')" style="cursor:pointer"><div><div style="font-size:12.5px;font-weight:700">${m?m.name:''}</div><div style="font-size:10.5px;color:var(--text2)">${p.date} · ${p.method}</div></div><div style="color:var(--green2);font-weight:800;font-size:12.5px">+${fmt(p.amount)}</div></div>`;
  });
  document.getElementById('homeRecent').innerHTML = rh;

  // Show members with negative balance
  const negMs = visMembers().filter(m=>calcBal(m.id).bal<0);
  let negHtml = '';
  if(negMs.length>0){
    negHtml = `<div class="card"><div class="card-hd"><div class="card-tt">🔴 أرصدة سالبة (${negMs.length})</div><button class="btn btn-o btn-sm" onclick="nav('members',document.getElementById('nb-members'))">عرض الكل</button></div>`;
    negMs.slice(0,5).forEach(m=>{
      const b=calcBal(m.id); const g=STATE.groups[m.gid];
      negHtml+=`<div class="irow" onclick="openDet('${m.id}')" style="cursor:pointer"><div><div style="font-weight:700;font-size:12.5px">${m.name}</div><div style="font-size:10.5px;color:var(--text2)">${g?g.name:''} · 🔴 ${b.dueCount} دين مستحق</div></div><div style="color:var(--red2);font-weight:800;font-size:13px">${fmt(b.bal)}</div></div>`;
    });
    negHtml += '</div>';
  }
  const negEl = document.getElementById('homeNeg');
  if(negEl) negEl.innerHTML = negHtml;
}

// ═══════════════════════════════════════
// MEMBERS
// ═══════════════════════════════════════
function renderMembers() {
  const sess = getSess(); if (!sess) return;
  if (sess.role === 'admin') {
    const allMs = arr(STATE.members);
    let th = `<button class="tabb active" onclick="setGF('all',this)">الكل (${allMs.length})</button>`;

      const c = allMs.filter(m=>m.gid===g.id).length;
      th += `<button class="tabb" onclick="setGF('${g.id}',this)">${g.name} (${c})</button>`;
    });

  } else {
    document.getElementById('memberTabs').innerHTML = '';
  }
  renderMList(visMembersByGroup(groupFilter));
}

function setGF(gid, btn) {
  groupFilter = gid;

function filterMembers() {
  const q = document.getElementById('msearch').value.toLowerCase();
  let ms = visMembersByGroup(groupFilter);
  if (q) ms = ms.filter(m=>m.name.includes(q)||m.phone.includes(q));
  renderMList(ms);
}

function renderMList(ms) {
  if (!ms.length) { document.getElementById('membersList').innerHTML=`<div class="empty"><div class="ei">👤</div><div class="et">لا يوجد مشتركون</div></div>`; return; }
  let h = '';
  ms.sort((a,z)=>a.name.localeCompare(z.name,'ar')).forEach(m => {
    const b = calcBal(m.id);
    const g = STATE.groups[m.gid];
    let bc='bz', bt='مسوّى';
    if (b.bal>0){bc='bp';bt='+'+fmt(b.bal)}
    else if (b.bal<0){bc='bn';bt=fmt(b.bal)}
    const avBg = m.photo ? 'transparent' : avatarColor(m.id);
    const avContent = m.photo ? `<img src="${m.photo}" alt="">` : m.name.charAt(0);
    const mDueCount = arr(STATE.debts).filter(d=>d.mid===m.id&&d.status==='مستحق').length;
    h += `<div class="mcard" onclick="openDet('${m.id}')">
      <div class="mav" style="background:${avBg}">${avContent}</div>
      <div class="minfo">
        <div class="mname">${m.name}</div>
        <div class="msub">${g?g.name:''} · ${(m.monthly||0).toLocaleString()} ${STATE.settings?.currency||'د.ع'}/شهر</div>
        <div style="display:flex;gap:5px;margin-top:4px;align-items:center">
          <span class="badge ${m.status==='نشط'?'b-act':'b-ina'}" style="font-size:9.5px">${m.status}</span>
          ${mDueCount>0?`<span class="badge b-due" style="font-size:9.5px">🔴 ${mDueCount} دين</span>`:''}
        </div>
      </div>
      <div class="mbal"><div class="${bc}">${bt}</div><div class="bl">الرصيد</div></div>
    </div>`;
  });
  document.getElementById('membersList').innerHTML = h;
}

// ═══════════════════════════════════════
// MEMBER DETAIL
// ═══════════════════════════════════════
function openDet(mid) {
  const m = STATE.members[mid]; if (!m) return;
  const b = calcBal(mid);
  const g = STATE.groups[m.gid];
  const mDebts = arr(STATE.debts).filter(d=>d.mid===mid).sort((a,z)=>z.year-a.year||z.month-a.month);
  const mPays = arr(STATE.payments).filter(p=>p.mid===mid&&p.status==='مؤكد').sort((a,z)=>z.date.localeCompare(a.date));
  const mNames=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

  let bcls='zer', bico='⚖️', blbl='الحساب مسوّى';
  if (b.bal>0){bcls='pos';bico='✅';blbl='رصيد إيجابي — دفع مقدماً'}
  else if (b.bal<0){bcls='neg';bico='🔴';blbl='رصيد سالب — عليه دين'}

  // Month grid
  const now = new Date();
  let mg = '<div class="mgrid">';
  for (let mo=1;mo<=12;mo++) {
    const d = mDebts.find(x=>x.year===now.getFullYear()&&x.month===mo);
    let cls='mem';
    if (d){if(d.status==='مدفوع_كلي')cls='mpaid';else if(d.status==='مدفوع_جزئي')cls='mpar';else if(d.status==='مستحق')cls='mdue';}
    mg += `<div class="mbox ${cls}">${mNames[mo-1].substring(0,3)}</div>`;
  }
  mg += '</div>';

  // Debts
  const sm={'مستحق':'dd','مدفوع_جزئي':'dp','مدفوع_كلي':'dk','دين_سابق':'do','ملغي':'do'};
  const si={'مستحق':'🔴','مدفوع_جزئي':'⚠️','مدفوع_كلي':'✅','دين_سابق':'📋','ملغي':'❌'};
  const sb={'مستحق':'b-due','مدفوع_جزئي':'b-par','مدفوع_كلي':'b-paid','دين_سابق':'b-old','ملغي':'b-ina'};
  let dH = mDebts.length ? '' : `<div class="empty"><div class="ei">✅</div><div class="et">لا توجد ديون</div></div>`;
  mDebts.forEach(d => {
    dH += `<div class="ditem ${sm[d.status]||''}" onclick="editDebtSt('${d.id}','${mid}')">
      <div><div class="dm">${d.year}/${String(d.month).padStart(2,'0')} — ${mNames[d.month-1]}</div><div class="dr">${si[d.status]||''} ${d.reason}</div></div>
      <div style="text-align:left"><div class="da">${fmt(d.amount)}</div><span class="badge ${sb[d.status]||'b-ina'}" style="font-size:9.5px">${d.status}</span></div>
    </div>`;
  });

  // Payments
  let pH = mPays.length ? '' : `<div class="empty"><div class="ei">💳</div><div class="et">لا توجد دفعات</div></div>`;

function setDF(st, btn) {
  debtFilter = st;

  let ds = visDebts();

  const mNames=['','يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function prevPhoto(e) {
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{pendingPhoto=ev.target.result;document.getElementById('phPrev').innerHTML=`<img src="${pendingPhoto}" alt="">`;};
  reader.readAsDataURL(file);
}

async function saveM() {
  const name=document.getElementById('f_name').value.trim();
  const phone=document.getElementById('f_phone').value.trim();
  const gid=document.getElementById('f_gid').value;
  const mo=parseInt(document.getElementById('f_mo').value)||0;
  const od=parseInt(document.getElementById('f_od').value)||0;
  const tgid=document.getElementById('f_tgid').value.trim();
  const dt=document.getElementById('f_dt').value;
  const notes=document.getElementById('f_notes').value.trim();
  if(!name||!phone||!gid||!mo){showAlert('❌ يرجى ملء الحقول المطلوبة','err');return}
  const id='S'+uid();
  setSyncing(true);
  try {
    await fbSet(`members/${id}`,{id,name,phone,tgid,photo:pendingPhoto||'',gid,status:'نشط',joined:dt,monthly:mo,oldDebt:od,notes,created:td()});
    pendingPhoto='';closeOv();showAlert('✅ تم إضافة المشترك وحفظه في السحابة');
    const s=STATE.settings||{};
    if(tgid&&s.tgToken&&s.notifyWelcome){
      const g=STATE.groups[gid];
      sendTG(tgid,`🌹 أهلاً وسهلاً ${name}\nنرحب بك في هيئة السيدة زينب عليها السلام\nمجموعتك: ${g?g.name:''}\nاشتراكك الشهري: ${fmt(mo)}\nبارك الله فيك 🌹`,'🌹 ترحيب',name);
    }
  } catch(e){showAlert('❌ خطأ: '+e.message,'err')}
  setSyncing(false);
}

async function addMonthlyDebts() {
  if(!confirm('إضافة ديون الشهر الحالي لجميع المشتركين النشطين؟'))return;
  const now=new Date(); const yr=now.getFullYear(); const mo=now.getMonth()+1;
  const mNames=['','يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  let added=0;
  const updates={};
  arr(STATE.members).filter(m=>m.status==='نشط').forEach(m=>{
    const exists=arr(STATE.debts).find(d=>d.mid===m.id&&d.year===yr&&d.month===mo);
    if(!exists){
      const id='D'+uid();
      updates[`debts/${id}`]={id,mid:m.id,gid:m.gid,year:yr,month:mo,amount:m.monthly,status:'مستحق',reason:`استحقاق ${mNames[mo]} ${yr}`,created:td(),by:'system'};
      added++;
    }
  });
  if(!added){showAlert('ℹ️ تم إضافة الديون مسبقاً لهذا الشهر','inf');return}
  setSyncing(true);
  try{await db.ref().update(updates);showAlert(`✅ تم إضافة ${added} دين للشهر الحالي`);}
  catch(e){showAlert('❌ خطأ: '+e.message,'err')}
  setSyncing(false);
}

async function updateUser(uid_) {

  const pass = document.getElementById('eu_pass').value.trim();
  const role = document.getElementById('eu_role').value;

  const active = document.getElementById('eu_active').value === 'true';
  if(!name||!uname||!pass){showAlert('❌ يرجى ملء الحقول المطلوبة','err');return}

  const dup = arr(STATE.users).find(u=>u.uname===uname&&u.id!==uid_);

    if(sess&&sess.id===uid_) setSess({...sess,name,uname,pass,role,gid,email,phone,active});

  if(user.pass!==old){showAlert('❌ كلمة المرور الحالية غلط','err');return}
  if(nw!==con){showAlert('❌ كلمات المرور غير متطابقة','err');return}
  if(nw.length<4){showAlert('❌ كلمة المرور قصيرة جداً','err');return}
  setSyncing(true);
  try{await fbUpdate(`users/${sess.id}`,{pass:nw});setSess({...sess,pass:nw});closeOv();showAlert('✅ تم تغيير كلمة المرور');}
  catch(e){showAlert('❌ خطأ','err')}
  setSyncing(false);
}

// ═══════════════════════════════════════
// TELEGRAM
// ═══════════════════════════════════════
async function sendTG(chatId, text, icon, name) {
  const s=STATE.settings||{}; if(!s.tgToken||!chatId)return;
  try{
    const r=await fetch(`https://api.telegram.org/bot${s.tgToken}/sendMessage`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({chat_id:chatId,text,parse_mode:'HTML'})
    });
    const data=await r.json();
    if(!data.ok) throw new Error(data.description);
    // Log notification
    const nid='N'+uid();
    await fbSet(`notifications/${nid}`,{id:nid,icon:icon||'📨',msg:`تم إرسال إشعار لـ ${name||chatId}`,time:new Date().toLocaleString('ar'),ts:Date.now()});
  }catch(e){console.log('TG error:',e.message)}
}

function sendMemberReport(mid) {
  const m=STATE.members[mid]; const s=STATE.settings||{};
  if(!m.tgid){showAlert('❌ لا يوجد Chat ID لهذا المشترك','err');return}
  if(!s.tgToken){showAlert('❌ لم يتم إعداد Telegram Token','err');return}
  const b=calcBal(mid); const g=STATE.groups[m.gid];
  const due=arr(STATE.debts).filter(d=>d.mid===mid&&d.status==='مستحق').reduce((s,d)=>s+d.amount,0);
  sendTG(m.tgid,`📊 تقريرك الشهري\nالاسم: ${m.name}\nالمجموعة: ${g?g.name:''}\n━━━━━━━━━━━━\n💰 المدفوع: ${fmt(b.paid)}\n📋 الديون: ${fmt(b.debts)}\n⚖️ رصيدك: ${fmt(b.bal)}\n🗓️ أشهر مدفوعة: ${b.months}\n${due>0?`⚠️ مستحق: ${fmt(due)}`:'✅ لا ديون مستحقة'}\n━━━━━━━━━━━━\n🌹 هيئة السيدة زينب عليها السلام`,'📊 تقرير',m.name);
  showAlert('✅ تم إرسال التقرير');
}

function sendMonthlyReports() {
  const s=STATE.settings||{};
  if(!s.tgToken){showAlert('❌ لم يتم إعداد Telegram Token','err');return}
  let sent=0;
  arr(STATE.members).filter(m=>m.status==='نشط'&&m.tgid).forEach(m=>{
    const b=calcBal(m.id); const g=STATE.groups[m.gid];
    const due=arr(STATE.debts).filter(d=>d.mid===m.id&&d.status==='مستحق').reduce((sv,d)=>sv+d.amount,0);
    sendTG(m.tgid,`📊 التقرير الشهري\n${m.name} — ${g?g.name:''}\n━━━━━━━━━━━━\n💰 المدفوع: ${fmt(b.paid)}\n📋 الديون: ${fmt(b.debts)}\n⚖️ الرصيد: ${fmt(b.bal)}\n${due>0?`⚠️ مستحق: ${fmt(due)}`:'✅ لا ديون مستحقة'}\n🌹 هيئة السيدة زينب عليها السلام`,'📊 تقرير شهري',m.name);
    sent++;
  });
  showAlert(`✅ تم إرسال التقارير لـ ${sent} مشترك`);
}

function sendBulk() {
  const s=STATE.settings||{}; const gid=document.getElementById('bulk_g').value;
  const msg=document.getElementById('bulk_msg').value.trim();
  if(!msg){showAlert('❌ يرجى كتابة الرسالة','err');return}
  if(!s.tgToken){showAlert('❌ لم يتم إعداد Telegram Token','err');return}
  let ms=arr(STATE.members).filter(m=>m.tgid&&m.status==='نشط');
  if(gid!=='all')ms=ms.filter(m=>m.gid===gid);
  ms.forEach(m=>sendTG(m.tgid,`📢 رسالة من هيئة السيدة زينب عليها السلام\n\n${msg}\n\n🌹 هيئة السيدة زينب عليها السلام`,'📢 جماعية',m.name));
  showAlert(`✅ تم الإرسال لـ ${ms.length} مشترك`);
  document.getElementById('bulk_msg').value='';
}

// ═══════════════════════════════════════
// REPORTS
// ═══════════════════════════════════════
function renderReports() {
  const sess = getSess(); if(!sess||sess.role!=='admin') return;
  const ps = arr(STATE.payments).filter(p=>p.status==='مؤكد');
  const ds = arr(STATE.debts);
  const ms = arr(STATE.members);
  const totalPaid = ps.reduce((s,p)=>s+p.amount,0);
  const totalDebts = ds.reduce((s,d)=>s+d.amount,0);
  const dueAmt = ds.filter(d=>d.status==='مستحق').reduce((s,d)=>s+d.amount,0);

  let h = `<div class="srow">
    <div class="sbox"><div class="sv" style="color:var(--green2);font-size:14px">${fmtS(totalPaid)}</div><div class="sl">إجمالي المقبوض</div></div>
    <div class="sbox"><div class="sv" style="color:var(--orange);font-size:14px">${fmtS(totalDebts)}</div><div class="sl">إجمالي الديون</div></div>
    <div class="sbox"><div class="sv" style="color:var(--red2);font-size:14px">${fmtS(dueAmt)}</div><div class="sl">المستحق</div></div>
  </div>`;

  // Groups comparison
  h += `<div style="margin-bottom:12px">`;
  arr(STATE.groups).forEach(g => {
    const gPaid = ps.filter(p=>p.gid===g.id).reduce((s,p)=>s+p.amount,0);
    const gDebts = ds.filter(d=>d.gid===g.id).reduce((s,d)=>s+d.amount,0);
    const gDue = ds.filter(d=>d.gid===g.id&&d.status==='مستحق').length;
    const cnt = ms.filter(m=>m.gid===g.id).length;
    const pct = gDebts>0 ? Math.min(100,Math.round(gPaid/gDebts*100)) : 100;
    const leader = arr(STATE.users).find(u=>u.id===g.lid);
    h += `<div style="background:#fff;border-radius:var(--r2);padding:12px;margin-bottom:8px;box-shadow:var(--sh2)">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-weight:700;font-size:13px;color:var(--navy)">${g.name}</span>
        <span class="badge ${pct===100?'b-paid':pct>=70?'b-pen':'b-due'}">${pct}% تحصيل</span>
      </div>
      <div class="pbar-wrap"><div class="pbar-lbl"><span>${leader?'👤 '+leader.name:'بدون معاون'}</span><span>${cnt} مشترك · 🔴 ${gDue} مستحق</span></div>
      <div class="pbar"><div class="pbar-fill" data-w="${pct}" style="width:0"></div></div></div>
      <div style="display:flex;gap:10px;margin-top:7px">
        <span style="font-size:10.5px;color:var(--green2)">💰 ${fmtS(gPaid)}</span>
        <span style="font-size:10.5px;color:var(--orange)">📊 ${fmtS(gDebts)}</span>
      </div>
    </div>`;
  });
  h += '</div>';

  // Negative balances
  const negMs = ms.filter(m=>calcBal(m.id).bal<0);
  if(negMs.length) {
    h += `<div style="background:var(--redli);border-radius:var(--r2);padding:12px;margin-bottom:8px">
      <div style="font-weight:700;font-size:12.5px;color:var(--red2);margin-bottom:8px">🔴 أرصدة سالبة (${negMs.length})</div>`;
    negMs.forEach(m=>{
      const b=calcBal(m.id); const g=STATE.groups[m.gid];
      h+=`<div class="irow" onclick="openDet('${m.id}')" style="cursor:pointer"><div><div style="font-weight:700;font-size:12.5px">${m.name}</div><div style="font-size:10.5px;color:var(--text2)">${g?g.name:''}</div></div><div style="color:var(--red2);font-weight:800;font-size:12.5px">${fmt(b.bal)}</div></div>`;
    });
    h += '</div>';
  }

  const el = document.getElementById('reportsContent');
  if(el) {
    el.innerHTML = h;
    setTimeout(()=>el.querySelectorAll('.pbar-fill').forEach(el2=>el2.style.width=el2.dataset.w+'%'),120);
  }
}

// ═══════════════════════════════════════
// BACKUP
// ═══════════════════════════════════════
function exportBak() {
  const data=JSON.stringify(STATE,null,2);
  try{
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download=`zainab_backup_${td()}.json`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),1000);
    showAlert('✅ تم التصدير — تحقق من مجلد التنزيلات');
  }catch(e){
    const w=window.open('','_blank');
    if(w){w.document.write('<pre style="direction:ltr;font-size:10px;word-wrap:break-word">'+data+'</pre>');showAlert('✅ افتح القائمة واضغط حفظ الصفحة');}
    else{navigator.clipboard?.writeText(data).then(()=>showAlert('✅ تم النسخ'));}
  }
}

async function importBak(e) {
  const file = e.target.files[0]; if(!file)return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try{
      const data = JSON.parse(ev.target.result);
      if(!data.members||!data.debts||!data.payments){showAlert('❌ ملف غير صحيح','err');return}
      if(!confirm('سيتم استعادة النسخة الاحتياطية وستُستبدل جميع البيانات الحالية. هل أنت متأكد؟'))return;
      setSyncing(true);
      try{
        const updates={};
        if(data.members) updates['members']=data.members;
        if(data.groups) updates['groups']=data.groups;
        if(data.users) updates['users']=data.users;
        if(data.debts) updates['debts']=data.debts;
        if(data.payments) updates['payments']=data.payments;
        if(data.notifications) updates['notifications']=data.notifications;
        if(data.settings) updates['settings']={...data.settings};
        await db.ref().update(updates);
        showAlert('✅ تم استعادة النسخة الاحتياطية بنجاح');
        setTimeout(()=>location.reload(),1500);
      }catch(err){showAlert('❌ خطأ في الاستعادة: '+err.message,'err')}
      setSyncing(false);
    }catch(err){showAlert('❌ ملف النسخة غير صحيح','err')}
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════
// MAIN INIT
// ═══════════════════════════════════════
window.onload = async function() {
  // Start loading bar
  setLdStatus('جاري الاتصال بـ Firebase...', 20);
  setTimeout(()=>setLdStatus('جاري تحميل البيانات...', 50), 800);

  try {
    // Check connection
    await db.ref('.info/connected').once('value');
    setLdStatus('جاري تهيئة البيانات...', 70);

    // Init default data if first time
    await initDefaultData();
    setLdStatus('جاري تفعيل المزامنة الفورية...', 85);

    // Set up real-time listeners — any change in Firebase updates STATE and re-renders
    const paths = ['users','groups','members','debts','payments','notifications','settings'];
    paths.forEach(path => {
      db.ref(path).on('value', snap => {
        const val = snap.val();
        if (path === 'settings') STATE.settings = val || STATE.settings;
        else STATE[path] = val || {};
        if (getSess()) renderAll();
      });
    });

    setLdStatus('✅ متصل بقاعدة البيانات!', 100);
    setTimeout(() => {
      document.getElementById('loading').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        // Check for saved session
        const saved = sessionStorage.getItem('z_sess');
        if (saved) {
          SESSION = JSON.parse(saved);
          bootApp();
        } else {
          document.getElementById('loginPage').style.display = 'flex';
        }
      }, 500);
    }, 800);

  } catch(e) {
    setLdStatus('❌ خطأ في الاتصال: '+e.message, 100);
    document.getElementById('ldFill').style.background = 'var(--red2)';
    setTimeout(() => {
      document.getElementById('loading').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('loginPage').style.display = 'flex';
        showAlert('⚠️ تعذر الاتصال بالسحابة — تحقق من الإنترنت', 'err');
      }, 500);
    }, 2000);
  }
};
