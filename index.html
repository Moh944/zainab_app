<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1628">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>هيئة السيدة زينب ع</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
--navy:#0a1628;--navy2:#112240;--blue:#1565c0;--blue2:#1976d2;--blueli:#e3f2fd;
--green:#1b5e20;--green2:#2e7d32;--greenli:#e8f5e9;
--gold:#c9973a;--goldli:#fff8e1;
--red:#b71c1c;--red2:#c62828;--redli:#ffebee;
--purple:#4a148c;--purpleli:#f3e5f5;
--gray:#f4f6f9;--gray2:#e8ecf0;--gray3:#c5cdd6;
--text:#1a2332;--text2:#546e7a;--white:#fff;
--r:14px;--r2:10px;
--sh:0 2px 16px rgba(10,22,40,.10);--sh2:0 1px 6px rgba(10,22,40,.07);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo',sans-serif;background:var(--gray);color:var(--text);min-height:100vh}

/* ═══ LOADING ═══ */
#loading{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:opacity .5s}
#loading::before{content:'';position:absolute;inset:0;background:linear-gradient(150deg,#0a1628,#112240,#1565c0);z-index:0}
#loading>*{position:relative;z-index:2}
.ld-logo{width:100px;height:100px;border-radius:50%;border:2.5px solid var(--gold);display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 0 40px rgba(201,151,58,.3);animation:glow 2s infinite}
@keyframes glow{0%,100%{box-shadow:0 0 30px rgba(201,151,58,.2)}50%{box-shadow:0 0 60px rgba(201,151,58,.5)}}
.ld-logo span{font-size:50px}
#loading h1{color:var(--gold);font-size:18px;font-weight:900;text-align:center;line-height:1.7}
#loading p{color:rgba(255,255,255,.45);font-size:12px;margin-top:6px;text-align:center}
.ld-status{margin-top:24px;color:rgba(255,255,255,.5);font-size:11.5px}
.ld-bar{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:10px}
.ld-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),#e8c96a);transition:width .8s ease}

/* ═══ LOGIN ═══ */
#loginPage{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:hidden}
#loginPage::before{content:'';position:absolute;inset:0;background:linear-gradient(150deg,#0a1628,#112240);z-index:0}
#loginPage>*{position:relative;z-index:2}
.login-badge{width:80px;height:80px;border-radius:50%;border:2.5px solid var(--gold);display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 0 30px rgba(201,151,58,.3)}
.login-badge span{font-size:40px}
#loginPage h2{color:var(--gold);font-size:17px;font-weight:900;text-align:center;line-height:1.7;margin-bottom:4px}
#loginPage .sub{color:rgba(255,255,255,.4);font-size:12px;text-align:center;margin-bottom:32px}
.lform{width:100%;max-width:340px}
.lform .fc{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);color:#fff}
.lform .fc::placeholder{color:rgba(255,255,255,.35)}
.lform .fl{color:rgba(255,255,255,.65)}
.login-tabs{display:flex;gap:8px;margin-bottom:20px;background:rgba(255,255,255,.08);border-radius:10px;padding:4px}
.ltab{flex:1;padding:8px;border-radius:8px;border:none;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;background:none;color:rgba(255,255,255,.5)}
.ltab.active{background:var(--gold);color:var(--navy)}

/* ═══ APP ═══ */
#app{display:none;flex-direction:column;min-height:100vh}

/* ═══ TOPBAR ═══ */
.topbar{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.tb-left{display:flex;align-items:center;gap:8px}
.tb-av{width:32px;height:32px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--navy)}
.tb-name{font-size:12px;color:rgba(255,255,255,.8);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-role{font-size:10px;color:var(--gold);font-weight:700}
.tb-title{font-size:13px;font-weight:800;color:var(--gold);text-align:center}
.tb-out{background:none;border:none;color:rgba(255,255,255,.5);font-size:18px;cursor:pointer;padding:5px}

/* ═══ BNAV ═══ */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:#fff;border-top:1px solid var(--gray2);display:flex;height:62px;box-shadow:0 -3px 16px rgba(0,0,0,.07)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:'Cairo',sans-serif;font-size:9.5px;font-weight:600;position:relative;transition:color .2s}
.bni .ic{font-size:20px;transition:transform .2s}
.bni.active{color:var(--blue2)}
.bni.active .ic{transform:translateY(-2px)}
.bni.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:3px;background:var(--blue2);border-radius:0 0 4px 4px}

/* ═══ MAIN ═══ */
.main{flex:1;padding:14px 14px 78px}
.page{display:none;animation:fadeUp .25s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ═══ COMPONENTS ═══ */
.stitle{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--sh2);margin-bottom:11px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--gray2)}
.card-tt{font-size:13.5px;font-weight:700;color:var(--navy)}
.irow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gray2)}
.irow:last-child{border-bottom:none}
.ilbl{font-size:11.5px;color:var(--text2);font-weight:600}
.ival{font-size:12.5px;font-weight:700;color:var(--navy)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2.5px 9px;border-radius:20px;font-size:10.5px;font-weight:700}
.b-green{background:var(--greenli);color:var(--green2)}
.b-red{background:var(--redli);color:var(--red2)}
.b-gold{background:var(--goldli);color:#7a5200}
.b-blue{background:var(--blueli);color:var(--blue2)}
.b-purple{background:var(--purpleli);color:var(--purple)}
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:var(--r2);font-family:'Cairo',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;border:none;transition:all .2s;width:100%}
.btn:active{transform:scale(.97)}
.btn-p{background:linear-gradient(135deg,var(--blue2),var(--navy));color:#fff;box-shadow:0 4px 14px rgba(21,101,192,.3)}
.btn-s{background:linear-gradient(135deg,var(--green2),var(--green));color:#fff;box-shadow:0 4px 14px rgba(46,125,50,.3)}
.btn-g{background:linear-gradient(135deg,var(--gold),#e8c96a);color:var(--navy);box-shadow:0 4px 14px rgba(201,151,58,.3)}
.btn-d{background:linear-gradient(135deg,var(--red2),var(--red));color:#fff}
.btn-o{background:#fff;color:var(--blue2);border:2px solid var(--blue2)}
.btn-sm{padding:7px 13px;font-size:11.5px;border-radius:8px;width:auto}
.btn-xs{padding:5px 10px;font-size:10.5px;border-radius:7px;width:auto}
.fg{margin-bottom:13px}
.fl{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block}
.fc{width:100%;padding:11px 13px;border:2px solid var(--gray2);border-radius:var(--r2);font-family:'Cairo',sans-serif;font-size:13.5px;color:var(--text);background:#fff;outline:none;transition:border-color .2s;appearance:none}
.fc:focus{border-color:var(--blue2)}
select.fc{cursor:pointer}
.empty{text-align:center;padding:30px 16px}
.empty .ei{font-size:40px;margin-bottom:10px}
.empty .et{font-size:13px;color:var(--text2);font-weight:600}
.alert{position:fixed;top:64px;left:14px;right:14px;z-index:999;padding:12px 15px;border-radius:var(--r2);font-size:12.5px;font-weight:700;text-align:center;transform:translateY(-16px);opacity:0;transition:all .3s;pointer-events:none}
.alert.show{transform:translateY(0);opacity:1}
.al-ok{background:var(--green2);color:#fff;box-shadow:0 4px 18px rgba(46,125,50,.4)}
.al-err{background:var(--red2);color:#fff;box-shadow:0 4px 18px rgba(198,40,40,.4)}
.al-inf{background:var(--blue2);color:#fff}
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:22px 22px 0 0;padding:20px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease}
.overlay.open .modal{transform:translateY(0)}
.mhandle{width:38px;height:4px;background:var(--gray2);border-radius:2px;margin:0 auto 18px}
.mtitle{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:18px}
.sbar{background:#fff;border-radius:var(--r2);padding:9px 13px;display:flex;align-items:center;gap:9px;box-shadow:var(--sh2);margin-bottom:13px;border:2px solid transparent;transition:border-color .2s}
.sbar:focus-within{border-color:var(--blue2)}
.sbar input{flex:1;border:none;outline:none;font-family:'Cairo',sans-serif;font-size:13.5px;background:none}
.back-btn{background:none;border:none;color:var(--blue2);font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:11px;display:flex;align-items:center;gap:4px;padding:0}

/* ═══ MEMBER CARD ═══ */
.mcard{background:#fff;border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh2);margin-bottom:9px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .2s;border:1.5px solid transparent}
.mcard:active{border-color:var(--blue2)}
.mav{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;flex-shrink:0}
.minfo{flex:1;min-width:0}
.mname{font-size:13.5px;font-weight:700;color:var(--navy)}
.msub{font-size:10.5px;color:var(--text2);margin-top:2px}
.mstat{text-align:left;flex-shrink:0}

/* ═══ ATTENDANCE ═══ */
.att-grid{display:flex;flex-direction:column;gap:8px}
.att-member{background:#fff;border-radius:var(--r2);padding:11px 14px;box-shadow:var(--sh2);display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.att-member.checked{background:var(--greenli);border:1.5px solid var(--green2)}
.att-member .am-name{font-size:13px;font-weight:700;color:var(--navy)}
.att-member .am-sub{font-size:10.5px;color:var(--text2);margin-top:2px}
.chk{width:26px;height:26px;border-radius:8px;border:2px solid var(--gray3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;background:#fff}
.chk.on{background:var(--green2);border-color:var(--green2);color:#fff}
.chk span{font-size:14px;display:none}
.chk.on span{display:block}

/* ═══ MONTHS DISPLAY ═══ */
.months-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.month-box{width:calc(25% - 5px);aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1.5px solid var(--gray3);background:var(--gray);color:var(--text2)}
.month-box.paid{background:var(--greenli);border-color:var(--green2);color:var(--green2)}
.month-box.num{font-size:16px;font-weight:900}

/* ═══ STATS CARDS ═══ */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:var(--r);padding:14px;box-shadow:var(--sh2);text-align:center;border-top:3px solid transparent}
.stat-card.sc-blue{border-top-color:var(--blue2)}
.stat-card.sc-green{border-top-color:var(--green2)}
.stat-card.sc-gold{border-top-color:var(--gold)}
.stat-card.sc-purple{border-top-color:var(--purple)}
.stat-card .sv{font-size:26px;font-weight:900;color:var(--navy);line-height:1}
.stat-card .sl{font-size:10.5px;color:var(--text2);font-weight:600;margin-top:4px}

/* ═══ ATTENDANCE HISTORY ═══ */
.att-item{background:#fff;border-radius:var(--r2);padding:11px 13px;margin-bottom:7px;box-shadow:var(--sh2);display:flex;align-items:center;justify-content:space-between}
.att-date{font-size:12.5px;font-weight:700;color:var(--navy)}
.att-type{font-size:10.5px;color:var(--text2);margin-top:2px}
.att-days{font-size:13px;font-weight:800;color:var(--blue2)}

/* ═══ PROGRESS BAR ═══ */
.pbar-wrap{margin:6px 0}
.pbar-lbl{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text2);margin-bottom:3px}
.pbar{height:8px;background:var(--gray2);border-radius:4px;overflow:hidden}
.pbar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green2),var(--gold));transition:width 1s ease}

/* ═══ MEMBER PROFILE (user view) ═══ */
.profile-hdr{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:var(--r);padding:20px 16px;margin-bottom:14px;color:#fff;text-align:center}
.profile-av{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#e8c96a);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:var(--navy);margin:0 auto 12px;box-shadow:0 4px 14px rgba(0,0,0,.3)}
.profile-name{font-size:18px;font-weight:800}
.profile-sub{font-size:11.5px;color:rgba(255,255,255,.55);margin-top:3px}

/* ═══ VISIT CARD ═══ */
.visit-card{background:#fff;border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh2);border-right:4px solid var(--purple)}
.visit-title{font-size:13px;font-weight:700;color:var(--navy)}
.visit-date{font-size:10.5px;color:var(--text2);margin-top:2px}
.visit-days{font-size:12px;font-weight:700;color:var(--purple);margin-top:4px}

/* ═══ JUMAA HISTORY ═══ */
.jumaa-item{background:#fff;border-radius:var(--r2);padding:10px 13px;margin-bottom:6px;box-shadow:var(--sh2);display:flex;align-items:center;gap:10px}
.jumaa-dot{width:10px;height:10px;border-radius:50%;background:var(--green2);flex-shrink:0}
.jumaa-date{font-size:12.5px;font-weight:700;color:var(--navy)}
.jumaa-num{font-size:10.5px;color:var(--text2)}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--gray3);border-radius:2px}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-logo"><span>🌹</span></div>
  <h1>هيئة السيدة زينب<br>عليها السلام</h1>
  <p>نظام إدارة الأعضاء والخدمة</p>
  <div class="ld-status" id="ldSt">جاري الاتصال...</div>
  <div class="ld-bar"><div class="ld-fill" id="ldFill"></div></div>
</div>

<div id="loginPage">
  <div class="login-badge"><span>🌹</span></div>
  <h2>هيئة السيدة زينب<br>عليها السلام</h2>
  <p class="sub">نظام إدارة الأعضاء والخدمة والاشتراكات</p>
  <div class="lform">
    <div class="login-tabs">
      <button class="ltab active" onclick="setLoginMode('admin',this)">👑 الإدارة</button>
      <button class="ltab" onclick="setLoginMode('member',this)">👤 العضو</button>
    </div>
    <div id="loginAdminForm">
      <div class="fg"><label class="fl">اسم المستخدم</label><input type="text" id="lu" class="fc" placeholder="اسم المستخدم"></div>
      <div class="fg"><label class="fl">كلمة المرور</label><input type="password" id="lp" class="fc" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doLogin()"></div>
    </div>
    <div id="loginMemberForm" style="display:none">
      <div class="fg"><label class="fl">رقم الهاتف</label><input type="tel" id="lm_phone" class="fc" placeholder="07xxxxxxxxx"></div>
      <div class="fg"><label class="fl">كلمة المرور</label><input type="password" id="lm_pass" class="fc" placeholder="كلمة المرور" onkeydown="if(event.key==='Enter')doMemberLogin()"></div>
    </div>
    <button class="btn btn-g" id="loginBtn" onclick="doLogin()" style="margin-top:4px">🔑 دخول</button>
    <p style="color:rgba(255,255,255,.2);font-size:10.5px;text-align:center;margin-top:12px">admin / admin123</p>
  </div>
</div>

<div class="alert" id="alertBox"></div>

<div id="app">
  <div class="topbar">
    <div class="tb-left">
      <div class="tb-av" id="tbAv"></div>
      <div><div class="tb-name" id="tbName"></div><div class="tb-role" id="tbRole"></div></div>
    </div>
    <div class="tb-title">🌹 هيئة السيدة زينب</div>
    <button class="tb-out" onclick="doLogout()">🚪</button>
  </div>

  <div class="main">

    <div class="page active" id="page-home">
      <div class="stitle"><span>📊</span>لوحة التحكم</div>
      <div class="stats-grid" id="homeStats"></div>
      <div id="homeContent"></div>
    </div>

    <div class="page" id="page-members">
      <div class="stitle"><span>👥</span>الأعضاء</div>
      <div class="sbar"><span style="color:var(--text2)">🔍</span><input type="text" placeholder="بحث بالاسم أو الهاتف أو المجموعة..." id="msearch" oninput="filterMembers()"></div>
      <div id="membersList"></div>
    </div>

    <div class="page" id="page-detail">
      <button class="back-btn" onclick="goBack()">← رجوع</button>
      <div id="detailContent"></div>
    </div>

    <div class="page" id="page-jumaa">
      <div class="stitle"><span>🕌</span>الجمعة</div>
      <div id="jumaaContent"></div>
    </div>

    <div class="page" id="page-visits">
      <div class="stitle"><span>🌿</span>الزيارات والمناسبات</div>
      <div id="visitsContent"></div>
    </div>

    <div class="page" id="page-finance">
      <div class="stitle"><span>💰</span>الاشتراكات المالية</div>
      <div id="financeContent"></div>
    </div>

    <div class="page" id="page-profile">
      <div id="profileContent"></div>
    </div>

    <div class="page" id="page-settings">
      <div class="stitle"><span>⚙️</span>الإعدادات</div>
      <div id="settingsContent"></div>
    </div>

  </div>

  <nav class="bnav" id="bnav"></nav>
</div>

<div class="overlay" id="ov" onclick="closeOvClick(event)">
  <div class="modal"><div class="mhandle"></div><div id="mb"></div></div>
</div>

<script>
// ═══════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════
firebase.initializeApp({
  apiKey:"AIzaSyCYZXQFi97cz7Q7wQwbhq0RisHXMDOgVCw",
  authDomain:"zainab-haia-7b9d5.firebaseapp.com",
  databaseURL:"https://zainab-haia-7b9d5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"zainab-haia-7b9d5",
  storageBucket:"zainab-haia-7b9d5.firebasestorage.app",
  messagingSenderId:"360098880295",
  appId:"1:360098880295:web:72bb1b53516bfed364e702"
});
const fdb = firebase.database();

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let S = {
  users:{}, members:{}, jumaa:{}, visits:{}, payments:{}, settings:{}
};
let SESSION = null;
let CP = 'home';
let prevPage = 'members';

// ═══════════════════════════════════════
// FIREBASE OPS

const fset = (p,d) => fdb.ref(p).set(d);

function getSess(){return SESSION}
function setSess(u){SESSION=u;sessionStorage.setItem('z2_sess',JSON.stringify(u))}
let loginMode = 'admin';

function setLoginMode(mode, btn) {
  loginMode = mode;
  document.querySelectorAll('.ltab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('loginAdminForm').style.display = mode==='admin'?'block':'none';
  document.getElementById('loginMemberForm').style.display = mode==='member'?'block':'none';
  document.getElementById('loginBtn').onclick = mode==='admin' ? doLogin : doMemberLogin;
}

function doLogin() {
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value.trim();
  const users=arr(S.users);
  const user=users.find(x=>x.uname===u&&x.pass===p&&x.active&&(x.role==='admin'||x.role==='moaven'));
  if(!user){showAlert('❌ اسم المستخدم أو كلمة المرور غلط','err');return}
  setSess(user);
  document.getElementById('loginPage').style.display='none';
  bootApp();
}

function doMemberLogin() {
  const phone=document.getElementById('lm_phone').value.trim();
  const pass=document.getElementById('lm_pass').value.trim();
  const members=arr(S.members);
  const member=members.find(m=>m.phone===phone&&m.pass===pass&&m.active);
  if(!member){showAlert('❌ رقم الهاتف أو كلمة المرور غلط','err');return}
  setSess({...member,role:'member'});
  document.getElementById('loginPage').style.display='none';
  bootMemberApp();
}

function doLogout(){
  if(!confirm('هل تريد تسجيل الخروج؟'))return;
  SESSION=null;sessionStorage.removeItem('z2_sess');location.reload();
}

function arr(o){return Object.values(o||{})}
function td(){return new Date().toISOString().split('T')[0]}
function uid(){return Date.now().toString(36).toUpperCase()+Math.random().toString(36).slice(2,5).toUpperCase()}
function fmt(n){if(typeof n!=='number')n=parseInt(n)||0;return n.toLocaleString('ar-IQ')+' '+(S.settings?.currency||'د.ع')}
function showAlert(msg,type='ok'){
  const el=document.getElementById('alertBox');
  el.textContent=msg;el.className=`alert al-${type} show`;
  setTimeout(()=>el.classList.remove('show'),3200);
}
function setLd(msg,pct){
  document.getElementById('ldSt').textContent=msg;
  document.getElementById('ldFill').style.width=pct+'%';
}
function openOv(html){document.getElementById('mb').innerHTML=html;document.getElementById('ov').classList.add('open')}
function closeOv(){document.getElementById('ov').classList.remove('open')}
function closeOvClick(e){if(e.target===document.getElementById('ov'))closeOv()}

function avatarColor(id){
  const c=['#1565c0','#2e7d32','#6a1b9a','#c62828','#e65100','#00695c','#4527a0','#0277bd'];
  let h=0;for(let i=0;i<id.length;i++)h=id.charCodeAt(i)+((h<<5)-h);
  return c[Math.abs(h)%c.length];
}

// Calculate member subscription months
function calcMonths(mid){
  const m=S.members[mid];if(!m)return{paid:0,months:0,paidMonths:[],fee:0};
  const fee = m.fee ? parseInt(m.fee) : (S.settings?.monthlyFee||10000);
  const paid=arr(S.payments).filter(p=>p.mid===mid).reduce((s,p)=>s+p.amount,0);
  const months=fee>0?Math.floor(paid/fee):0;
  return{paid,months,fee};
}

// Count member attendance
function calcAttendance(mid){
  const jumaaDays=arr(S.jumaa).filter(j=>j.attendees&&j.attendees[mid]).length;
  const visitDays=arr(S.visits).filter(v=>v.attendees&&v.attendees[mid]).reduce((s,v)=>{
    const d = v.attendees[mid];
    return s + (typeof d === 'number' ? d : (v.days||1));
  },0);
  return{jumaaDays,visitDays,total:jumaaDays+visitDays};
}

function renderMList(ms){

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

  ms.forEach(m=>{

async function saveMember(){
  const name=document.getElementById('f_name').value.trim();
  const phone=document.getElementById('f_phone').value.trim();
  const pass=document.getElementById('f_pass').value.trim();
  const group=document.getElementById('f_group').value.trim();
  const fee=parseInt(document.getElementById('f_fee').value)||0; 
  const join=document.getElementById('f_join').value;
  const notes=document.getElementById('f_notes').value.trim();
  if(!name||!phone||!pass){showAlert('❌ يرجى ملء الحقول المطلوبة','err');return}
  if(arr(S.members).find(m=>m.phone===phone)){showAlert('❌ رقم الهاتف مستخدم مسبقاً','err');return}
  const id='M'+uid();
  try{
    await fset(`members/${id}`,{id,name,phone,pass,group,fee,joined:join,notes,active:true,created:td()});
    closeOv();showAlert('✅ تم إضافة العضو');
    refreshCurrentPage();
  }catch(e){showAlert('❌ خطأ: '+e.message,'err')}
}

async function deleteMember(mid){
  const m=S.members[mid];
  if(!confirm(`هل أنت متأكد من حذف العضو "${m.name}"؟\nسيتم حذف جميع بياناته نهائياً!`))return;
  try{
    const u={};
    u[`members/${mid}`]=null;
    arr(S.payments).filter(p=>p.mid===mid).forEach(p=>u[`payments/${p.id}`]=null);

}

async function savePayment(mid){
  const amt=parseInt(document.getElementById('p_amt').value)||0;
  const date=document.getElementById('p_date').value;
  const note=document.getElementById('p_note').value.trim();
  if(amt<=0){showAlert('❌ يرجى إدخال مبلغ صحيح','err');return}
  const id='P'+uid();
  const sess=getSess();
  try{
    await fset(`payments/${id}`,{id,mid,amount:amt,date,note,by:sess.id,created:td()});
    const {months,fee}=calcMonths(mid);
    closeOv();showAlert(`✅ تم تسجيل الدفعة — أصبح لديه ${months+Math.floor(amt/(fee||10000))} شهر`);
    openMemberDetail(mid);
  }catch(e){showAlert('❌ خطأ: '+e.message,'err')}
}

  }

async function selectAllJumaa(jid,select){
  const active=arr(S.members).filter(m=>m.active);
  const updates={};
  active.forEach(m=>{updates[`jumaa/${jid}/attendees/${m.id}`]=select?true:null;});
  try{
    await fdb.ref().update(updates);

      const chk=document.getElementById(`chk_${m.id}`);

      if(chk)chk.className=`chk ${select?'on':''}`;
      if(card)card.className=`att-member ${select?'checked':''}`;

  }catch(e){}
}

function renderProfile(){
  const sess=getSess();if(!sess)return;
  const mid=sess.id;
  const m=S.members[mid];
  if(!m){document.getElementById('profileContent').innerHTML=`<div class="empty"><div class="ei">⚠️</div><div class="et">لم يتم العثور على بيانات العضو</div></div>`;return}

  const {paid,months,fee}=calcMonths(mid);
  const att=calcAttendance(mid);
  const color=avatarColor(mid);

  // Months display
  const mNames=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  let mHtml=`<div class="months-row">`;
  for(let i=0;i<12;i++){
    const isPaid=i<months;
    mHtml+=`<div class="month-box ${isPaid?'paid':''}">
      <div style="font-size:9px">${mNames[i].substring(0,3)}</div>
      <div style="font-size:14px">${isPaid?'✅':'○'}</div>
    </div>`;
  }
  mHtml+=`</div>`;

  // Jumaa history
  const myJumaa=arr(S.jumaa).filter(j=>j.attendees&&j.attendees[mid]).sort((a,z)=>z.date.localeCompare(a.date));
  let jHtml='';
  myJumaa.slice(0,10).forEach(j=>{
    jHtml+=`<div class="jumaa-item"><div class="jumaa-dot"></div><div class="jumaa-date">${j.date}</div><span class="badge b-green" style="font-size:9.5px">✅ حضرت</span></div>`;
  });

  // Visits history
  const myVisits=arr(S.visits).filter(v=>v.attendees&&v.attendees[mid]).sort((a,z)=>z.date.localeCompare(a.date));
  let vHtml='';
  myVisits.forEach(v=>{
    const servedDays = typeof v.attendees[mid] === 'number' ? v.attendees[mid] : (v.days||1);
    vHtml+=`<div class="visit-card">
      <div class="visit-title">${v.name}</div>
      <div class="visit-date">📅 ${v.date}</div>
      <div class="visit-days">⏱️ ${servedDays} يوم خدمة</div>
    </div>`;
  });

  document.getElementById('profileContent').innerHTML=`
    <div class="profile-hdr">
      <div class="profile-av" style="background:${color};color:#fff">${m.name.charAt(0)}</div>
      <div class="profile-name">${m.name}</div>
      <div class="profile-sub">عضو في هيئة السيدة زينب عليها السلام</div>
    </div>

    <div class="stats-grid">
      <div class="stat-card sc-green"><div class="sv">${months}</div><div class="sl">أشهر مدفوعة</div></div>
      <div class="stat-card sc-blue"><div class="sv">${att.jumaaDays}</div><div class="sl">جمعة حضرت</div></div>
      <div class="stat-card sc-purple"><div class="sv">${att.visitDays}</div><div class="sl">أيام زيارات</div></div>
      <div class="stat-card sc-gold"><div class="sv">${att.total}</div><div class="sl">إجمالي أيام الخدمة</div></div>
    </div>

    <div class="card">
      <div class="card-hd"><div class="card-tt">💰 حالة اشتراكي — ${months} شهر مدفوع</div></div>
      ${mHtml}
      <div class="irow"><span class="ilbl">إجمالي ما دفعت</span><span class="ival" style="color:var(--green2)">${fmt(paid)}</span></div>
      <div class="irow"><span class="ilbl">الاشتراك الشهري</span><span class="ival">${fmt(fee)}</span></div>
    </div>

    <div class="card">
      <div class="card-hd"><div class="card-tt">🕌 حضوري في الجمعة (${att.jumaaDays} جمعة)</div></div>
      ${jHtml||`<div class="empty"><div class="ei">🕌</div><div class="et">لم تسجل حضور جمعة بعد</div></div>`}
    </div>

    <div class="card">
      <div class="card-hd"><div class="card-tt">🌿 الزيارات والمناسبات (${myVisits.length})</div></div>
      ${vHtml||`<div class="empty"><div class="ei">🌿</div><div class="et">لم تسجل حضور زيارة بعد</div></div>`}
    </div>
  `;
}

// ═══════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════
function renderSettings(){
  const sess=getSess();
  const s=S.settings||{};
  let h=`
    <div class="card"><div class="card-hd"><div class="card-tt">⚙️ إعدادات النظام</div></div>
      <div class="fg"><label class="fl">اسم الهيئة</label><input type="text" id="s_name" class="fc" value="${s.orgName||'هيئة السيدة زينب عليها السلام'}"></div>
      <div class="fg"><label class="fl">الاشتراك الشهري (الافتراضي)</label><input type="number" id="s_fee" class="fc" value="${s.monthlyFee||10000}"></div>
      <div class="fg"><label class="fl">العملة</label><input type="text" id="s_cur" class="fc" value="${s.currency||'د.ع'}"></div>
      <button class="btn btn-p" onclick="saveSettings()">💾 حفظ الإعدادات</button>
    </div>

    <div class="card"><div class="card-hd"><div class="card-tt">👥 المستخدمون الإداريون</div><button class="btn btn-p btn-sm" onclick="openAddAdmin()">+ إضافة</button></div>
      <div id="adminList"></div>
    </div>

    <div class="card"><div class="card-hd"><div class="card-tt">💾 النسخ الاحتياطي</div></div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-s" onclick="exportBak()">⬇️ تصدير نسخة احتياطية</button>
        <button class="btn btn-o" onclick="document.getElementById('impFile').click()">⬆️ استعادة نسخة</button>
        <input type="file" id="impFile" accept=".json" style="display:none" onchange="importBak(event)">
      </div>
    </div>

    <div class="card"><div class="card-hd"><div class="card-tt">👤 حسابي</div></div>
      <div class="irow"><span class="ilbl">الاسم</span><span class="ival">${sess.name}</span></div>
      <div class="irow"><span class="ilbl">الدور</span><span class="ival">${sess.role==='admin'?'👑 مدير عام':'🔑 معاون'}</span></div>
      <button class="btn btn-o btn-sm" style="margin-top:10px;width:auto" onclick="openChangePass()">🔑 تغيير كلمة المرور</button>
    </div>
  `;
  document.getElementById('settingsContent').innerHTML=h;
  renderAdminList();
}

function renderAdminList(){
  const admins=arr(S.users);
  let h='';
  admins.forEach(u=>{
    h+=`<div class="irow"><div><div style="font-weight:700;font-size:12.5px">${u.name}</div><div style="font-size:10.5px;color:var(--text2)">${u.uname} · ${u.role==='admin'?'مدير عام':'معاون'}</div></div>
      <div style="display:flex;gap:6px"><button class="btn btn-o btn-xs" onclick="openEditAdmin('${u.id}')">✏️</button>${u.id!=='ADM001'?`<button class="btn btn-d btn-xs" onclick="deleteAdmin('${u.id}')">🗑️</button>`:''}</div>
    </div>`;
  });
  const el=document.getElementById('adminList');if(el)el.innerHTML=h;
}

function openAddAdmin(){
  openOv(`
    <div class="mtitle">👤 إضافة مستخدم إداري</div>
    <div class="fg"><label class="fl">الاسم *</label><input type="text" id="a_name" class="fc"></div>
    <div class="fg"><label class="fl">اسم الدخول *</label><input type="text" id="a_uname" class="fc"></div>
    <div class="fg"><label class="fl">كلمة المرور *</label><input type="text" id="a_pass" class="fc"></div>
    <div class="fg"><label class="fl">الدور</label><select id="a_role" class="fc"><option value="moaven">🔑 معاون</option><option value="admin">👑 مدير عام</option></select></div>
    <button class="btn btn-p" onclick="saveAdmin()">💾 إضافة</button>
  `);
}

async function saveAdmin(){
  const name=document.getElementById('a_name').value.trim();
  const uname=document.getElementById('a_uname').value.trim();
  const pass=document.getElementById('a_pass').value.trim();
  const role=document.getElementById('a_role').value;
  if(!name||!uname||!pass){showAlert('❌ يرجى ملء الحقول','err');return}
  if(arr(S.users).find(u=>u.uname===uname)){showAlert('❌ اسم الدخول مستخدم','err');return}
  const id='ADM'+uid();
  try{await fset(`users/${id}`,{id,uname,pass,name,role,active:true,created:td()});closeOv();showAlert('✅ تم الإضافة');}
  catch(e){showAlert('❌ خطأ','err')}
}

function openEditAdmin(uid_){
  const u=arr(S.users).find(x=>x.id===uid_);
  openOv(`
    <div class="mtitle">✏️ تعديل — ${u.name}</div>
    <div class="fg"><label class="fl">الاسم</label><input type="text" id="ea_name" class="fc" value="${u.name}"></div>
    <div class="fg"><label class="fl">اسم الدخول</label><input type="text" id="ea_uname" class="fc" value="${u.uname}"></div>
    <div class="fg"><label class="fl">كلمة المرور</label><input type="text" id="ea_pass" class="fc" value="${u.pass}"></div>
    <div class="fg"><label class="fl">الدور</label><select id="ea_role" class="fc"><option value="moaven" ${u.role==='moaven'?'selected':''}>🔑 معاون</option><option value="admin" ${u.role==='admin'?'selected':''}>👑 مدير عام</option></select></div>
    <button class="btn btn-p" onclick="updateAdmin('${uid_}')">💾 حفظ</button>
  `);
}

async function updateAdmin(uid_){
  const updates={name:document.getElementById('ea_name').value.trim(),uname:document.getElementById('ea_uname').value.trim(),pass:document.getElementById('ea_pass').value.trim(),role:document.getElementById('ea_role').value};
  try{await fupd(`users/${uid_}`,updates);closeOv();showAlert('✅ تم الحفظ');}
  catch(e){showAlert('❌ خطأ','err')}
}

async function deleteAdmin(uid_){
  if(!confirm('هل أنت متأكد؟'))return;
  try{await fdel(`users/${uid_}`);showAlert('✅ تم الحذف');}
  catch(e){showAlert('❌ خطأ','err')}
}

async function saveSettings(){
  const updates={orgName:document.getElementById('s_name').value.trim(),monthlyFee:parseInt(document.getElementById('s_fee').value)||10000,currency:document.getElementById('s_cur').value.trim()||'د.ع'};
  try{await fupd('settings',updates);showAlert('✅ تم حفظ الإعدادات');}
  catch(e){showAlert('❌ خطأ','err')}
}

function openChangePass(){
  const sess=getSess();
  openOv(`
    <div class="mtitle">🔑 تغيير كلمة المرور</div>
    <div class="fg"><label class="fl">كلمة المرور الحالية</label><input type="password" id="cp_old" class="fc"></div>
    <div class="fg"><label class="fl">كلمة المرور الجديدة</label><input type="password" id="cp_new" class="fc"></div>
    <div class="fg"><label class="fl">تأكيد</label><input type="password" id="cp_con" class="fc"></div>
    <button class="btn btn-p" onclick="changePass('${sess.id}')">💾 تغيير</button>
  `);
}

async function changePass(uid_){
  const old=document.getElementById('cp_old').value;
  const nw=document.getElementById('cp_new').value;
  const con=document.getElementById('cp_con').value;
  const user=arr(S.users).find(u=>u.id===uid_);
  if(user.pass!==old){showAlert('❌ كلمة المرور الحالية غلط','err');return}
  if(nw!==con){showAlert('❌ كلمات المرور غير متطابقة','err');return}
  if(nw.length<4){showAlert('❌ كلمة المرور قصيرة جداً','err');return}
  try{await fupd(`users/${uid_}`,{pass:nw});setSess({...getSess(),pass:nw});closeOv();showAlert('✅ تم التغيير');}
  catch(e){showAlert('❌ خطأ','err')}
}

// ═══════════════════════════════════════
// BACKUP
// ═══════════════════════════════════════
function exportBak(){
  const data=JSON.stringify(S,null,2);
  try{
    const blob=new Blob([data],{type:'application/json'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download=`zainab_haia_backup_${td()}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    showAlert('✅ تم التصدير');
  }catch(e){showAlert('❌ خطأ في التصدير','err')}
}

async function importBak(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.members){showAlert('❌ ملف غير صحيح','err');return}
      if(!confirm('سيتم استبدال جميع البيانات. هل أنت متأكد؟'))return;
      const u={};
      if(data.members)u['members']=data.members;
      if(data.users)u['users']=data.users;
      if(data.jumaa)u['jumaa']=data.jumaa;
      if(data.visits)u['visits']=data.visits;
      if(data.payments)u['payments']=data.payments;
      if(data.settings)u['settings']=data.settings;
      await fdb.ref().update(u);
      showAlert('✅ تم الاستيراد بنجاح');
      setTimeout(()=>location.reload(),1500);
    }catch(err){showAlert('❌ ملف غير صحيح','err')}
  };reader.readAsText(file);
}

// ═══════════════════════════════════════
// FIREBASE LISTENERS
// ═══════════════════════════════════════
function startListeners(){
  ['users','members','jumaa','visits','payments','settings'].forEach(path=>{
    fdb.ref(path).on('value',snap=>{
      S[path]=snap.val()||(path==='settings'?{}:{});
      if(SESSION)refreshCurrentPage();
    });
  });
}

function refreshCurrentPage(){
  if(CP==='home')renderHome();
  else if(CP==='members')renderMembers();
  else if(CP==='jumaa')renderJumaa();
  else if(CP==='visits')renderVisits();
  else if(CP==='finance')renderFinance();
  else if(CP==='settings'){renderSettings();}
  else if(CP==='profile')renderProfile();
  else if(CP==='detail'){
    const detailId = document.getElementById('detailContent').innerHTML.match(/'(M[A-Z0-9]+|J[A-Z0-9]+|V[A-Z0-9]+)'/);
    if(detailId && detailId[1]){
        if(detailId[1].startsWith('M')) openMemberDetail(detailId[1]);
        else if(detailId[1].startsWith('J')) openJumaaDetail(detailId[1]);
        else if(detailId[1].startsWith('V')) openVisitDetail(detailId[1]);
    }
  }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
window.onload=async function(){
  setLd('جاري الاتصال بـ Firebase...',20);
  try{
    await fdb.ref('.info/connected').once('value');
    setLd('جاري تهيئة البيانات...',50);
    await initDefault();
    setLd('جاري تفعيل المزامنة...',80);
    startListeners();
    setLd('✅ جاهز!',100);
    setTimeout(()=>{
      document.getElementById('loading').style.opacity='0';
      setTimeout(()=>{
        document.getElementById('loading').style.display='none';
        const saved=sessionStorage.getItem('z2_sess');
        if(saved){
          SESSION=JSON.parse(saved);
          if(SESSION.role==='member')bootMemberApp();
          else bootApp();
        }else{
          document.getElementById('loginPage').style.display='flex';
        }
      },500);
    },600);
  }catch(e){
    setLd('❌ تعذر الاتصال: '+e.message,100);
    setTimeout(()=>{
      document.getElementById('loading').style.opacity='0';
      setTimeout(()=>{
        document.getElementById('loading').style.display='none';
        document.getElementById('loginPage').style.display='flex';
        showAlert('⚠️ تعذر الاتصال — تحقق من الإنترنت','err');
      },500);
    },2000);
  }
};
</script>
